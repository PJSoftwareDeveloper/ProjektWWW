<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplikacja Pogodowa</title>
<link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="app">
    <nav>
        <a href="index.html" class="nav-item">Home</a>
        <a href="longTerm.html" class="nav-item">Długoterminowa</a>
        <a href="shortTerm.html" class="nav-item">Krótkoterminowa</a>
        <a href="settings.html" class="nav-item">Ustawienia</a>
    </nav>
    <main id="settings" class="view">

        <header>
            <h2>Ustawienia</h2>
        </header>

        <section class="settings-section">
            <ul class="settings-list">

                <li>
                    <label for="city">Miasto</label>
                    <input type="text" id="city" placeholder="np. Białystok">
                </li>

                <li>
                    <label for="days">Ilość dni prognozy</label>
                    <input type="number" id="days" min="1" max="16" placeholder="1–16">
                </li>

                <li>
                    <button class="settings-btn">Zapisz</button>
                </li>

            </ul>
        </section>

    </main>



</div>

</body>
</html>
