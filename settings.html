<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustawienia</title>

<style>
    body {  
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to bottom, #4facfe, #00f2fe);
        color: white;
    }

    .app {
        max-width: 420px;
        margin: auto;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    h1, h2, h3 {
        margin: 5px 0;
    }

    .bottom-nav {
        margin-top: auto;
        display: flex;
        background: rgba(0,0,0,0.2);
    }

    .nav-btn {
        flex: 1;
        padding: 15px;
        text-align: center;
        cursor: pointer;
    }

    .nav-btn:hover {
        background: rgba(255, 26, 26, 0.2);
    }
    
    input {
                margin: 10px;
                padding: 6px 12px;
                font-size: 16px;
                font-weight: 400;
                line-height: 1.5;
                color: #212529;
                background-color: #fff;
                background-clip: padding-box;
                border: 1px solid #ced4da;
                appearance: none;
                border-radius: 4px;
                transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
                :focus{
                    color: #212529;
                    background-color: #fff;
                    border-color: #86b7fe;
                    outline: 0;
                    box-shadow: 0 0 0 0.25rem rgb(13 110 253 / 25%);
                }
                
    }

    div {
        background: rgba(255,255,255,0.2);
        padding: 10px;
        border-radius: 12px;
        margin: 25px;
    }
</style>
</head>

<body>

<div class="app">

    <!-- 1. AKTUALNA POGODA -->
    <div id="home" class="view active">
        <form>
            <label for="city">Miasto:</label><br>
            <input type="text" id="city"><br>
            <label for="days">Ilosc dni dlugoterminowej:</label><br>
            <input type="number" id="days" name="quantity" min="1" max="16"><br>
        </form>
    </div>

     <!-- NAWIGACJA -->
    <div class="bottom-nav">
        <div class="nav-btn">🏠</div>
        <div class="nav-btn">📅</div>
        <div class="nav-btn">📊</div>
    </div>
<script>
</script>

</body>
</html>
