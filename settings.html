<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplikacja Pogodowa</title>
<link rel="stylesheet" href="style.css"/>
<script src="js/core.js" defer></script>
<script src="js/settings.js" defer></script>
</head>

<body>

<div class="app">
    
    <nav>
        <a href="index.html" class="nav-item">
            <img src="img/home.svg">
            <span>Home</span>
        </a>

        <a href="longTerm.html" class="nav-item">
            <img src="img/calendar.svg">
            <span>Długoterminowa</span>
        </a>

        <a href="shortTerm.html" class="nav-item">
            <img src="img/clock.svg">
            <span>Krótkoterminowa</span>
        </a>

        <a href="settings.html" class="nav-item">
            <img src="img/settings.svg">
            <span>Ustawienia</span>
        </a>
    </nav>
    <main id="settings" class="view">

        <header>
            <h2>Ustawienia</h2>
        </header>

        <section class="settings-section">
            <ul class="settings-list">

                <li>
                    <p id="cityNameLabel"></p>
                    <label for="citySearch">Miasto</label>
                    <button id="citySearch">Wybierz</button>
                </li>
                <li>
                    <label for="days">Ilość dni prognozy</label>
                    <input type="number" id="days" min="1" max="16" placeholder="1–16">
                </li>
                <li>
                    <label for="darkmode">Tryb ciemny</label>
                    <input width="32px" type="checkbox" id="darkmode">
                </li>

                <li>
                    <button class="save-btn" id="save-btn">Zapisz</button>
                </li>

                <li>
                    <h2 id="saveMessage"></h2>
                </li>

            </ul>
        </section>

        <section class="modal-city" id="modal-city">
            <div class="modal-inner">

                <header class="modal-top">
                    <h2>Wyszukaj miasto</h2>
                    <button class="modal-close" id="modal-close">&#10006;</button>
                </header>

                <input type="text" id="cityName" placeholder="Wpisz nazwę miasta..." onkeyup="loadCityNames()">

                <ul class="city-names">
                    <li id="city-name-1"></li>
                    <li id="city-name-2"></li>
                    <li id="city-name-3"></li>
                </ul>

            </div>
        </section>

    </main>



</div>

</body>
</html>
