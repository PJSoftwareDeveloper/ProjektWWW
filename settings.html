<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplikacja Pogodowa</title>
<link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="app">
    
    <nav>
        <a href="index.html" class="nav-item">
            <img src="img/home.svg">
            <span>Home</span>
        </a>

        <a href="longTerm.html" class="nav-item">
            <img src="img/calendar.svg">
            <span>Długoterminowa</span>
        </a>

        <a href="shortTerm.html" class="nav-item">
            <img src="img/clock.svg">
            <span>Krótkoterminowa</span>
        </a>

        <a href="settings.html" class="nav-item">
            <img src="img/settings.svg">
            <span>Ustawienia</span>
        </a>
    </nav>
    <main id="settings" class="view">

        <header>
            <h2>Ustawienia</h2>
        </header>

        <section class="settings-section">
            <ul class="settings-list">

                <li>
                    <label for="citySearch">Miasto</label>
                    <button id="citySearch">Nazwa Mista</button>
                </li>
                <li>
                    <label for="days">Ilość dni prognozy</label>
                    <input type="number" id="days" min="1" max="16" placeholder="1–16">
                </li>

                <li>
                    <button class="settings-btn">Zapisz</button>
                </li>

            </ul>
        </section>

        <section class="modal-city" id="modal-city">
            <div class="modal-inner">
                    <h2 class="modal-top">Wyszukaj miasto <button class="modal-close" id="modal-close">&#10006;</button></h2>
                <input type="text" id="cityName" onkeyup="loadCityNames()">
                <ul class="city-names">
                    <li class="city-button" id="city-name-1"></li>
                    <li class="city-button"  id="city-name-2"></li>
                    <li class="city-button"  id="city-name-3"></li>
                </ul>
            </div>
        </section>

    </main>



</div>
<script src="js/core.js"></script>
<script src="js/settings.js"></script>

</body>
</html>
