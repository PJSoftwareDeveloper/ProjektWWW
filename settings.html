<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustawienia</title>
<link rel="stylesheet" href="style.css"/>
<style>
    form{
        text-align: center;
    }
    input {
        width: 200px;
        margin: 10px;
        padding: 6px 12px;
        font-size: 16px;
        font-weight: 400;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        background-clip: padding-box;
        border: 1px solid #ced4da;
        appearance: none;
        border-radius: 4px;
        transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
        :focus{
            color: #212529;
            background-color: #fff;
            border-color: #86b7fe;
            outline: 0;
            box-shadow: 0 0 0 0.25rem rgb(13 110 253 / 25%);
        }
                
    }

</style>
</head>

<body>

<div class="app">
    <div class="view">
        <form>
            <label for="city">Miasto:</label><br>
            <input type="text" id="city"><br>
            <label for="days">Ilosc dni dlugoterminowej:</label><br>
            <input type="number" id="days" name="quantity" min="1" max="16"><br>
        </form>
    </div>

    <div class="bottom-nav">

    </div>

</html>
