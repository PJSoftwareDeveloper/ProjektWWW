<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplikacja Pogodowa</title>

<link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="app">
    <div id="home" class="view">
        <h2>Białystok</h2>
        <p>Środa, 1 kwietnia</p>

        <div class="center">
            <div class="big-temp">12°C</div>
        </div>

        <div class="row">
            <div>Wiatr 15 km/h</div>
            <div>Wilgość 70%</div>
        </div>

        <div class="row">
            <div>Wschód 06:10</div>
            <div>Zachód 19:20</div>
        </div>

        <div class="hourly">
            <div class="hour-box">08:00<br>Słonecznie<br>10°</div>
            <div class="hour-box">09:00<br>Częściowo zachmurzone<br>11°</div>
            <div class="hour-box">10:00<br>Zachmurzone<br>12°</div>
            <div class="hour-box">11:00<br>Zachmurzone<br>13°</div>
        </div>
    </div>
    <div class="bottom-nav">
        <a class="nav-btn" href="index.html">Home</a>
        <a class="nav-btn" href="longTerm.html">Długoterminowa</a>
        <a class="nav-btn" href="shortTerm.html">Krótkoterminowa</a>
        <a class="nav-btn" href="settings.html">Ustawienia</a>
    </div>

</div>

</html>
